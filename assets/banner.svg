  <rect x="529" y="116" width="100" height="26" rx="13" fill="#da3633" fill-opacity="0.25" stroke="#f85149" stroke-width="1.5"/>
  <text x="579" y="133" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#f85149">🔴 Pro</text>

  <!-- Stats row -->
  <rect x="248" y="162" width="440" height="52" rx="8" fill="#0d1b2a" stroke="#1d3354" stroke-width="1"/>
  <text x="318" y="183" text-anchor="middle" font-family="sans-serif" font-size="19">🐳</text>
  <text x="318" y="202" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">Containers</text>
