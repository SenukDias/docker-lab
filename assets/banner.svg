    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="195" x2="900" y2="195"/>
    <line x1="225" y1="0" x2="225" y2="260"/>
    <line x1="450" y1="0" x2="450" y2="260"/>
    <line x1="675" y1="0" x2="675" y2="260"/>
  </g>

  <!-- === LEFT: Official Docker Logo === -->
  <!-- Docker logo background — rounded square with Docker blue tint -->
  <rect x="18" y="62" width="148" height="148" rx="18" fill="#2496ED" fill-opacity="0.08" stroke="#2496ED" stroke-width="1.5"/>

  <!-- Docker official logo — 110x110 centered in left panel (center=92,136) -->
  <use href="#docker-logo" x="37" y="81" width="110" height="110"/>

  <!-- Docker wordmark under logo -->
  <text x="92" y="224" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#2496ED" letter-spacing="3">DOCKER</text>

  <!-- === CENTER TITLE === -->
  <text x="468" y="70" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="33" font-weight="900" fill="#e6edf3" filter="url(#glow)">Docker Lab Session</text>
  <text x="468" y="98" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#8b949e">14 Hands-on Labs · 3 Skill Levels · 5 Sample Apps · Real-world CI/CD</text>

