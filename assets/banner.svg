  <rect x="728" y="68" width="158" height="142" rx="8" fill="#0d1b2a" stroke="#1d3354" stroke-width="1.5"/>
  <rect x="728" y="68" width="158" height="24" rx="8" fill="#122136"/>
  <circle cx="746" cy="80" r="5" fill="#ff5f57"/>
  <circle cx="762" cy="80" r="5" fill="#febc2e"/>
  <circle cx="778" cy="80" r="5" fill="#28c840"/>
  <text x="810" y="83" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">bash</text>
  <text x="740" y="108" font-family="monospace" font-size="9.5" fill="#2496ED">$ docker run nginx</text>
  <text x="740" y="121" font-family="monospace" font-size="9.5" fill="#3fb950">Pulling image...</text>
  <text x="740" y="134" font-family="monospace" font-size="9.5" fill="#2496ED">$ docker build .</text>
