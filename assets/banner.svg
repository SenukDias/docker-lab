  <text x="488" y="183" text-anchor="middle" font-family="sans-serif" font-size="19">🔧</text>
  <text x="488" y="202" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">Compose</text>
  <line x1="528" y1="168" x2="528" y2="208" stroke="#1d3354" stroke-width="1"/>
  <text x="568" y="183" text-anchor="middle" font-family="sans-serif" font-size="19">🚀</text>
  <text x="568" y="202" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">CI/CD</text>
  <line x1="608" y1="168" x2="608" y2="208" stroke="#1d3354" stroke-width="1"/>
  <text x="648" y="183" text-anchor="middle" font-family="sans-serif" font-size="19">🔒</text>
  <text x="648" y="202" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">Security</text>

