  </defs>
  <rect width="860" height="345" fill="#0d1117" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <use href="#docker-logo" x="14" y="10" width="28" height="28"/>
  <text x="52" y="31" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Theory 02 — Containers vs Virtual Machines</text>
  <line x1="0" y1="48" x2="860" y2="48" stroke="#1d3354" stroke-width="1"/>

  <!-- VM column title -->
  <text x="215" y="78" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#f85149">Virtual Machine (VM)</text>
  <!-- VM stack boxes -->
  <rect x="80" y="90" width="270" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="112" text-anchor="middle" font-family="monospace" font-size="12" fill="#e6edf3">App A</text>
  <rect x="80" y="130" width="270" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="152" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Guest OS (Ubuntu)</text>
  <rect x="80" y="170" width="270" height="34" rx="6" fill="#da3633" fill-opacity="0.25" stroke="#f85149" stroke-width="1"/>
  <text x="215" y="192" text-anchor="middle" font-family="monospace" font-size="12" fill="#f85149">Hypervisor (VMware/VBox)</text>
  <rect x="80" y="210" width="270" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Host OS (Linux/Win/Mac)</text>
  <rect x="80" y="250" width="270" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="215" y="272" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">Hardware</text>
  <text x="215" y="305" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#f85149">⚠️  GBs · Minutes to boot · Full Guest OS</text>

  <!-- Container column title -->
  <!-- Docker logo next to "Container" title -->
  <use href="#docker-logo" x="584" y="58" width="24" height="24"/>
  <text x="642" y="78" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#2496ED">Container (Docker)</text>

  <!-- Container stacks — two containers side by side -->
  <rect x="510" y="90" width="120" height="34" rx="6" fill="#21262d" stroke="#2496ED" stroke-width="1.5"/>
  <text x="570" y="112" text-anchor="middle" font-family="monospace" font-size="12" fill="#e6edf3">App A</text>
  <rect x="642" y="90" width="120" height="34" rx="6" fill="#21262d" stroke="#2496ED" stroke-width="1.5"/>
  <text x="702" y="112" text-anchor="middle" font-family="monospace" font-size="12" fill="#e6edf3">App B</text>
  <!-- Docker Engine row -->
  <rect x="510" y="130" width="252" height="34" rx="6" fill="#2496ED" fill-opacity="0.2" stroke="#2496ED" stroke-width="1.5"/>
  <use href="#docker-logo" x="518" y="136" width="22" height="22"/>
  <text x="655" y="152" text-anchor="middle" font-family="monospace" font-size="12" fill="#2496ED">Docker Engine</text>
  <rect x="510" y="170" width="252" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="636" y="192" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">Host OS (shared kernel)</text>
  <rect x="510" y="210" width="252" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="636" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">Hardware</text>
  <text x="636" y="305" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3fb950">✅  MBs · Milliseconds · No Guest OS</text>

  <!-- VS divider -->
  <text x="430" y="195" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="900" fill="#d29922">VS</text>
  <line x1="430" y1="85" x2="430" y2="285" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="430" y="332" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">Containers share the host OS kernel — no Guest OS overhead. Docker uses Linux namespaces and cgroups for isolation.</text>
</svg>
