<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
  <rect width="860" height="320" fill="#0d1117" rx="12"/>
  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#e6edf3">🐳  Theory 01 — What is Docker?</text>
  <line x1="40" y1="52" x2="820" y2="52" stroke="#30363d" stroke-width="1"/>
  <!-- Traditional deployment box -->
  <rect x="40" y="68" width="360" height="220" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <rect x="40" y="68" width="360" height="36" rx="8" fill="#da3633" fill-opacity="0.4"/>
  <text x="220" y="91" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#f85149">❌  Traditional Deployment</text>
  <text x="80" y="122" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8b949e">• "Works on my machine" syndrome</text>
  <text x="80" y="142" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8b949e">• Manual dependency installation</text>
  <text x="80" y="162" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8b949e">• Environment inconsistency (dev ≠ prod)</text>
  <text x="80" y="182" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8b949e">• Slow provisioning &amp; setup time</text>
  <text x="80" y="202" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8b949e">• Conflict between app dependencies</text>
  <text x="80" y="222" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8b949e">• Heavyweight VMs for isolation</text>
  <text x="80" y="250" font-family="'Segoe UI',sans-serif" font-size="12" fill="#f85149">⚠️  App + OS = tightly coupled</text>
  <!-- Docker box -->
  <rect x="460" y="68" width="360" height="220" rx="8" fill="#161b22" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="460" y="68" width="360" height="36" rx="8" fill="#0ea5e9" fill-opacity="0.3"/>
  <text x="640" y="91" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#22d3ee">✅  With Docker</text>
  <text x="500" y="122" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e6edf3">• Package app + deps into one image</text>
  <text x="500" y="142" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e6edf3">• Run anywhere: laptop, server, cloud</text>
  <text x="500" y="162" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e6edf3">• Identical env from dev → production</text>
  <text x="500" y="182" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e6edf3">• Start in milliseconds (not minutes)</text>
  <text x="500" y="202" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e6edf3">• Isolated namespaces &amp; cgroups</text>
  <text x="500" y="222" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e6edf3">• Versioned, reproducible builds</text>
  <text x="500" y="250" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3fb950">✅  Ship it once, run it everywhere</text>
  <!-- Arrow between -->
  <text x="430" y="180" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" fill="#d29922">→</text>
  <!-- Bottom label -->
  <text x="430" y="305" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#6e7681">Docker solves the "dependency hell" and environment mismatch problem</text>
</svg>
