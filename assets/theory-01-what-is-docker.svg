  <rect width="860" height="330" fill="#0d1117" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <use href="#docker-logo" x="14" y="10" width="28" height="28"/>
  <text x="52" y="31" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Theory 01 — What is Docker?</text>
  <line x1="0" y1="48" x2="860" y2="48" stroke="#1d3354" stroke-width="1"/>

  <!-- Before Docker column -->
  <rect x="32" y="66" width="370" height="232" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <rect x="32" y="66" width="370" height="36" rx="8" fill="#da3633" fill-opacity="0.2"/>
  <text x="42" y="89" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#f85149">❌  Traditional Deployment</text>
  <text x="52" y="120" font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">• "Works on my machine" syndrome</text>
  <text x="52" y="140" font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">• Manual dependency installation</text>
  <text x="52" y="160" font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">• Dev ≠ Staging ≠ Production</text>
  <text x="52" y="180" font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">• Slow provisioning (hours/days)</text>
  <text x="52" y="200" font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">• Conflicting app dependencies</text>
  <text x="52" y="220" font-family="'Segoe UI',sans-serif" font-size="12" fill="#8b949e">• Heavy VMs for isolation (GBs)</text>
  <text x="52" y="250" font-family="'Segoe UI',sans-serif" font-size="11" fill="#f85149">⚠️  App + OS tightly coupled</text>
  <text x="52" y="268" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">Setup: hours · Conflicts: common</text>

  <!-- Arrow between -->
  <text x="428" y="188" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="28" fill="#d29922">→</text>

  <!-- With Docker column -->
  <rect x="458" y="66" width="370" height="232" rx="8" fill="#161b22" stroke="#2496ED" stroke-width="1.5"/>
  <rect x="458" y="66" width="370" height="36" rx="8" fill="#2496ED" fill-opacity="0.15"/>
  <!-- Docker logo in column header -->
  <use href="#docker-logo" x="464" y="72" width="24" height="24"/>
  <text x="498" y="89" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#2496ED">✅  With Docker</text>
  <text x="478" y="120" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Package app + all deps into image</text>
  <text x="478" y="140" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Run anywhere: laptop → cloud</text>
  <text x="478" y="160" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Identical env from dev to prod</text>
  <text x="478" y="180" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Start in milliseconds</text>
  <text x="478" y="200" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Isolated namespaces + cgroups</text>
  <text x="478" y="220" font-family="'Segoe UI',sans-serif" font-size="12" fill="#e6edf3">• Versioned, reproducible builds</text>
  <text x="478" y="250" font-family="'Segoe UI',sans-serif" font-size="11" fill="#3fb950">✅  Ship once, run everywhere</text>
  <text x="478" y="268" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">Setup: seconds · Conflicts: none</text>

  <text x="430" y="316" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6e7681">Docker solves dependency hell and environment mismatch — the core problems of modern deployment</text>
</svg>
