<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
  <rect width="860" height="320" fill="#0d1117" rx="12"/>
  <text x="430" y="36" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#e6edf3">🏛️  Theory 03 — Docker Architecture</text>
  <line x1="40" y1="50" x2="820" y2="50" stroke="#30363d" stroke-width="1"/>
  <!-- CLI box -->
  <rect x="40" y="70" width="150" height="80" rx="8" fill="#161b22" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="115" y="100" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#22d3ee">Docker CLI</text>
  <text x="115" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">docker run</text>
  <text x="115" y="132" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">docker build</text>
  <!-- Arrow CLI → Daemon -->
  <line x1="192" y1="110" x2="255" y2="110" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr)"/>
  <text x="224" y="105" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">REST API</text>
  <!-- Daemon box -->
  <rect x="257" y="62" width="200" height="200" rx="8" fill="#161b22" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="257" y="62" width="200" height="30" rx="8" fill="#0ea5e9" fill-opacity="0.25"/>
  <text x="357" y="82" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#0ea5e9">Docker Daemon (dockerd)</text>
  <!-- Inside daemon -->
  <rect x="272" y="102" width="170" height="30" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="357" y="121" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#e6edf3">📦 Container Runtime</text>
  <rect x="272" y="140" width="170" height="30" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="357" y="159" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#e6edf3">🏗️ Image Builder</text>
  <rect x="272" y="178" width="170" height="30" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="357" y="197" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#e6edf3">🌐 Network Manager</text>
  <rect x="272" y="216" width="170" height="30" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="357" y="235" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#e6edf3">💾 Volume Manager</text>
  <!-- Arrow Daemon → Registry -->
  <line x1="459" y1="162" x2="530" y2="162" stroke="#2563eb" stroke-width="2"/>
  <polygon points="530,157 540,162 530,167" fill="#2563eb"/>
  <text x="495" y="157" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="10" fill="#6e7681">pull/push</text>
  <!-- Registry box -->
  <rect x="542" y="70" width="170" height="180" rx="8" fill="#161b22" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="542" y="70" width="170" height="30" rx="8" fill="#2563eb" fill-opacity="0.25"/>
  <text x="627" y="90" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#58a6ff">Registry</text>
  <text x="627" y="118" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">Docker Hub</text>
  <rect x="560" y="128" width="134" height="22" rx="4" fill="#21262d"/>
  <text x="627" y="143" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950">ubuntu:22.04</text>
  <rect x="560" y="156" width="134" height="22" rx="4" fill="#21262d"/>
  <text x="627" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950">node:20-alpine</text>
  <rect x="560" y="184" width="134" height="22" rx="4" fill="#21262d"/>
  <text x="627" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950">nginx:latest</text>
  <text x="627" y="232" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#8b949e">GHCR / ECR / ACR</text>
  <!-- Running container -->
  <rect x="730" y="90" width="110" height="60" rx="8" fill="#238636" fill-opacity="0.3" stroke="#2ea043" stroke-width="1.5"/>
  <text x="785" y="112" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3fb950">Container</text>
  <text x="785" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Running</text>
  <text x="785" y="142" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Instance</text>
  <line x1="459" y1="100" x2="728" y2="100" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="728,96 738,100 728,104" fill="#30363d"/>
  <text x="430" y="300" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#6e7681">The CLI sends commands → Daemon executes them → pulls images from Registry → runs Containers</text>
</svg>
